name: "دانلود، تقسیم و آپلود خودکار فایل (AxionOS)"

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        default: 'https://cdn.axionos.org/begonia/axion-2.6-QUASIS-20260521-OFFICIAL-PICO-begonia.zip'
        type: string
      part_size:
        description: 'اندازه هر قطعه (مثلاً 95M)'
        required: false
        default: '95M'
        type: string

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: آماده‌سازی محیط
        run: echo "شروع دانلود..."

      - name: دریافت فایل با هدرهای شبیه‌سازی مرورگر
        run: |
          echo "دانلود از: ${{ github.event.inputs.file_url }}"
          curl -L -o "original_file.bin" "${{ github.event.inputs.file_url }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Referer: https://axionos.org/" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            --retry 5 --retry-delay 3 --max-time 1800
          echo "دانلود کامل شد."
          ls -lh original_file.bin

      - name: تقسیم فایل به قطعات
        run: |
          echo "تقسیم فایل به قطعات ${{ github.event.inputs.part_size }}..."
          split -b ${{ github.event.inputs.part_size }} -d -a 3 original_file.bin "part_"
          echo "تقسیم انجام شد. تعداد قطعات: $(ls part_* | wc -l)"

      - name: آپلود قطعات به Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "axionos-${{ github.run_id }}"
          name: "فایل AxionOS - ${{ github.run_id }}"
          body: |
            **فایل دانلود شده:**
            - **لینک اصلی:** `${{ github.event.inputs.file_url }}`
            - **تاریخ:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            **نحوه ترکیب قطعات:**
            ```bash
            cat part_* > فایل_نهایی.zip
